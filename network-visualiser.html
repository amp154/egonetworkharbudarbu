// ── SETUP ─────────────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;
const svg = d3.select('#canvas').attr('viewBox', `0 0 ${W} ${H}`);
const g = svg.append('g');

svg.call(d3.zoom().scaleExtent([0.05, 8]).on('zoom', e => g.attr('transform', e.transform)));

const nodeById = new Map();
const nodes = NODES_RAW.map(([id, label, artist, genre, avg_rank, days, cities]) => {
  const n = { id, label, artist, genre, avg_rank, days, cities, isHD: id === HD_ID };
  nodeById.set(id, n);
  return n;
});

const allLinks = LINKS_RAW.filter(([,, w]) => w > 0)
  .map(([s, t, w]) => ({ source: s, target: t, weight: w }));

const hdWeightMap = new Map();
allLinks.forEach(l => {
  const other = l.source === HD_ID ? l.target : (l.target === HD_ID ? l.source : null);
  if (other !== null) hdWeightMap.set(other, l.weight);
});
const hdNeighborIds = new Set(hdWeightMap.keys());
hdNeighborIds.add(HD_ID);

const maxDays = d3.max(nodes, n => n.days);
const rScale = d3.scaleSqrt().domain([0, maxDays]).range([2.5, 15]);

const wExtent = d3.extent(allLinks, l => l.weight);
const strokeScale = d3.scaleLog()
  .domain([Math.max(1, wExtent[0]), wExtent[1]])
  .range([0.4, 6]);

// ── LEGEND ────────────────────────────────────────────────────────────────────
const hiddenGenres = new Set();
const legendDiv = document.getElementById('legend');
Object.entries(GENRE_COLORS).forEach(([genre, color]) => {
  const row = document.createElement('div');
  row.className = 'leg-row'; row.dataset.genre = genre;
  row.innerHTML = `<div class="leg-dot" style="background:${color}"></div><div class="leg-label">${genre}</div>`;
  row.addEventListener('click', () => {
    if (hiddenGenres.has(genre)) { hiddenGenres.delete(genre); row.classList.remove('hidden'); }
    else { hiddenGenres.add(genre); row.classList.add('hidden'); }
    applyVisibility();
  });
  legendDiv.appendChild(row);
});

// ── SIMULATION ────────────────────────────────────────────────────────────────
let showAll = true, linkSel, nodeSel, simulation;

function getActiveNodes() {
  return showAll ? nodes : nodes.filter(n => hdNeighborIds.has(n.id));
}
function getActiveLinks(activeNodeIds) {
  return allLinks.filter(l => activeNodeIds.has(l.source) && activeNodeIds.has(l.target));
}

function buildSim() {
  const activeNodes = getActiveNodes();
  const activeIds = new Set(activeNodes.map(n => n.id));
  const activeLinks = getActiveLinks(activeIds);

  const simNodes = activeNodes.map(n => {
    const sn = Object.assign({}, n);
    if (n.isHD) { sn.fx = W / 2; sn.fy = H / 2; }
    return sn;
  });
  const nodeMap = new Map(simNodes.map(n => [n.id, n]));
  const simLinks = activeLinks
    .map(l => ({ source: nodeMap.get(l.source), target: nodeMap.get(l.target), weight: l.weight }))
    .filter(l => l.source && l.target);

  g.selectAll('*').remove();

  linkSel = g.append('g').selectAll('line').data(simLinks).join('line')
    .attr('stroke', '#475569').attr('stroke-opacity', 0.4)
    .attr('stroke-width', d => strokeScale(d.weight));

  const nodeG = g.append('g').selectAll('g').data(simNodes).join('g')
    .call(d3.drag()
      .on('start', (e, d) => { if (!d.isHD && !e.active) simulation.alphaTarget(0.2).restart(); if (!d.isHD) { d.fx = d.x; d.fy = d.y; } })
      .on('drag', (e, d) => { if (!d.isHD) { d.fx = e.x; d.fy = e.y; } })
      .on('end', (e, d) => { if (!d.isHD) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; } })
    );

  nodeG.append('circle')
    .attr('r', d => d.isHD ? 18 : rScale(d.days))
    .attr('fill', d => GENRE_COLORS[d.genre] || '#94a3b8')
    .attr('stroke', d => d.isHD ? '#f59e0b' : 'rgba(0,0,0,0.35)')
    .attr('stroke-width', d => d.isHD ? 3 : 1)
    .style('filter', d => d.isHD ? 'drop-shadow(0 0 10px rgba(245,158,11,0.9))' : null);

  nodeG.filter(d => d.isHD).append('text')
    .text('Harbu Darbu')
    .attr('text-anchor', 'middle').attr('dy', '-22')
    .attr('fill', '#f59e0b').attr('font-weight', '700').attr('font-size', '13px')
    .style('pointer-events', 'none');

  const tooltip = document.getElementById('tooltip');
  nodeG.on('mouseover', (e, d) => {
    const w = hdWeightMap.get(d.id);
    tooltip.innerHTML = `<div class="t-title">${d.label}</div>
      <div class="t-row">Artist: <span>${d.artist}</span></div>
      <div class="t-row">Genre: <span>${d.genre}</span></div>
      <div class="t-row">Avg rank: <span>#${d.avg_rank}</span></div>
      <div class="t-row">Days charting: <span>${d.days}</span></div>
      ${w ? `<div class="t-row">Co-chart weight with Harbu Darbu: <span class="t-weight">${w}</span></div>` : ''}`;
    tooltip.style.display = 'block';
  }).on('mousemove', e => {
    tooltip.style.left = (e.pageX + 14) + 'px';
    tooltip.style.top = (e.pageY - 10) + 'px';
  }).on('mouseout', () => tooltip.style.display = 'none');

  nodeSel = nodeG;

  simulation = d3.forceSimulation(simNodes)
    .force('link', d3.forceLink(simLinks).id(d => d.id)
      .distance(d => {
        if (d.weight >= 250) return 70;
        if (d.weight >= 150) return 100;
        if (d.weight >= 80) return 140;
        if (d.weight >= 30) return 180;
        return 260;
      })
      .strength(d => Math.min(0.9, d.weight / 150))
    )
    .force('charge', d3.forceManyBody().strength(-50).distanceMax(250))
    .force('collision', d3.forceCollide().radius(d => rScale(d.days) + 2))
    .force('center', d3.forceCenter(W / 2, H / 2).strength(0.03))
    .alphaDecay(0.035)
    .on('tick', ticked)
    .on('end', () => simNodes.forEach(n => { if (!n.isHD) { n.fx = n.x; n.fy = n.y; } }));

  applyVisibility();
}

function ticked() {
  linkSel
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeSel.attr('transform', d => `translate(${d.x ?? 0},${d.y ?? 0})`);
}

function applyVisibility() {
  if (!nodeSel) return;
  nodeSel.style('opacity', d => hiddenGenres.has(d.genre) ? 0.05 : 1);
}

buildSim();

// ── CONTROLS ──────────────────────────────────────────────────────────────────
document.getElementById('btn-all').addEventListener('click', () => {
  showAll = true;
  document.getElementById('btn-all').classList.add('active');
  document.getElementById('btn-ego').classList.remove('active');
  buildSim();
});
document.getElementById('btn-ego').addEventListener('click', () => {
  showAll = false;
  document.getElementById('btn-ego').classList.add('active');
  document.getElementById('btn-all').classList.remove('active');
  buildSim();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  svg.transition().duration(600).call(d3.zoom().transform, d3.zoomIdentity);
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');
searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.style.display = 'none'; return; }
  const hits = nodes.filter(n =>
    n.label.toLowerCase().includes(q) || n.artist.toLowerCase().includes(q)
  ).slice(0, 8);
  if (!hits.length) { searchResults.style.display = 'none'; return; }
  searchResults.innerHTML = hits.map(n =>
    `<div class="s-row" data-id="${n.id}">${n.label} <small style="color:#64748b">— ${n.artist}</small></div>`
  ).join('');
  searchResults.style.display = 'block';
  searchResults.querySelectorAll('.s-row').forEach(row => {
    row.addEventListener('click', () => {
      highlightNode(parseInt(row.dataset.id));
      searchResults.style.display = 'none';
      searchInput.value = '';
    });
  });
});
document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) searchResults.style.display = 'none';
});

function highlightNode(id) {
  if (!nodeSel) return;
  nodeSel.selectAll('circle')
    .attr('stroke', d => d.id === id ? '#ffffff' : d.isHD ? '#f59e0b' : 'rgba(0,0,0,0.35)')
    .attr('stroke-width', d => d.id === id ? 4 : d.isHD ? 3 : 1);
}
</script>
